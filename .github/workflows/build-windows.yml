name: Build Windows App

on:
  workflow_dispatch:          # 在 GitHub 网页上手动点击触发
  push:
    tags:
      - 'v*'                  # 推送 v1.0.0 这样的 tag 时自动触发并发布 Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pywebview pyinstaller

      - name: PyInstaller 打包
        run: pyinstaller ppttovideo.spec --noconfirm

      - name: 压缩输出目录
        shell: pwsh
        run: |
          Compress-Archive -Path dist\PPTtoVideo -DestinationPath dist\PPTtoVideo-Windows.zip

      # 每次构建都上传产物，可在 Actions 页面下载（保留 30 天）
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: PPTtoVideo-Windows
          path: dist\PPTtoVideo-Windows.zip
          retention-days: 30

      # 仅在推送 tag 时自动创建 GitHub Release 并附上安装包
      - name: 发布 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: PPT转视频 ${{ github.ref_name }}
          files: dist\PPTtoVideo-Windows.zip
          draft: false
          prerelease: false
